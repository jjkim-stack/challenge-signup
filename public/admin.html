<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>관리자 · 신청 현황</title>
<style>
  :root { --brand:#2f6fed; --brand-d:#1f57c4; --bg:#f5f7fb; --line:#e3e7ee; --muted:#6b7280; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
         background:var(--bg); color:#1f2430; }
  .wrap { max-width:1080px; margin:0 auto; padding:28px 20px 64px; }
  h1 { font-size:22px; margin:0 0 18px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:18px; }
  .login { max-width:380px; margin:80px auto; }
  .login label { display:block; font-weight:600; font-size:14px; margin-bottom:6px; }
  input[type=password], input[type=text] { width:100%; padding:11px 13px; border:1px solid var(--line);
        border-radius:9px; font-size:15px; }
  input:focus { outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(47,111,237,.12); }
  button { font-family:inherit; }
  .btn { padding:11px 16px; font-size:14px; font-weight:700; color:#fff; background:var(--brand);
         border:none; border-radius:9px; cursor:pointer; }
  .btn:hover { background:var(--brand-d); }
  .btn.ghost { background:#fff; color:var(--brand); border:1.5px solid var(--brand); }
  .msg { margin-top:12px; font-size:14px; color:#c0392b; display:none; }
  .msg.show { display:block; }

  .summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .scell { border:1px solid var(--line); border-radius:10px; padding:12px; cursor:pointer; transition:.12s; }
  .scell:hover { border-color:var(--brand); box-shadow:0 1px 6px rgba(47,111,237,.12); }
  .scell.sel { border-color:var(--brand); box-shadow:0 0 0 2px rgba(47,111,237,.35); background:#f5f8ff; }
  .link-clear { background:none; border:none; color:var(--brand); font-weight:700; cursor:pointer;
                font-size:13px; font-family:inherit; padding:0 2px; }
  .link-clear:hover { text-decoration:underline; }
  .scell .lbl { font-size:12.5px; color:var(--muted); }
  .scell .cnt { font-size:19px; font-weight:800; margin-top:3px; }
  .scell .bar { height:6px; border-radius:4px; background:#eef1f6; margin-top:8px; overflow:hidden; }
  .scell .bar > i { display:block; height:100%; background:var(--brand); }
  .scell.waitlist .bar > i { background:#e0952f; }
  .scell.full .bar > i { background:#c0392b; }
  .scell .st { font-size:11px; font-weight:700; margin-top:6px; display:inline-block; padding:1px 7px; border-radius:999px; }
  .st.open{ background:#e7f6ec; color:#1a7f43;} .st.waitlist{ background:#fef3e0; color:#b5651d;} .st.full{ background:#fde8e8; color:#c0392b;}

  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:14px; }
  .toolbar .grow { flex:1; min-width:200px; }
  .count-info { font-size:13.5px; color:var(--muted); }

  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); }
  th { font-size:12.5px; color:var(--muted); background:#fafbfd; position:sticky; top:0; }
  tr:hover td { background:#fafbff; }
  .tag { font-size:11px; font-weight:700; padding:1px 7px; border-radius:999px; background:#eef4ff; color:var(--brand-d); }
  .empty { text-align:center; color:var(--muted); padding:30px 0; }
  @media (max-width:720px){ .summary{ grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>
<div class="wrap">

  <!-- 로그인 -->
  <div id="loginView" class="card login">
    <h1 style="margin-bottom:14px">관리자 로그인</h1>
    <label for="pw">비밀번호</label>
    <input id="pw" type="password" placeholder="관리자 비밀번호" />
    <button class="btn" id="loginBtn" style="width:100%; margin-top:14px">로그인</button>
    <div class="msg" id="loginMsg">비밀번호가 올바르지 않습니다.</div>
  </div>

  <!-- 대시보드 -->
  <div id="dashView" style="display:none">
    <h1>신청 현황</h1>

    <div class="card">
      <div style="font-weight:700; margin-bottom:12px">일정별 신청 인원</div>
      <div class="summary" id="summary"></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <input class="grow" id="search" type="text" placeholder="이름 · 이메일 · 휴대폰 검색" />
        <button class="btn ghost" id="searchBtn">검색</button>
        <button class="btn" id="csvBtn">CSV 다운로드</button>
        <button class="btn ghost" id="refreshBtn">새로고침</button>
      </div>
      <div class="count-info" id="countInfo"></div>
      <div style="overflow-x:auto; margin-top:10px">
        <table>
          <thead>
            <tr><th>#</th><th>참석</th><th>이름</th><th>이메일</th><th>휴대폰</th><th>신청 일정</th><th>수정</th><th>신청일시</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
let pw = '';
let allRegs = [];       // 현재 불러온 전체 신청 목록 (검색 반영)
let allSlots = [];      // 일정별 집계
let slotFilter = null;  // 선택된 일정 id (null이면 전체)
let curSearch = '';

async function login() {
  pw = document.getElementById('pw').value;
  const ok = await loadData('');
  if (ok) {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashView').style.display = 'block';
  } else {
    document.getElementById('loginMsg').classList.add('show');
  }
}

async function loadData(q) {
  try {
    const res = await fetch('/api/admin/data?q=' + encodeURIComponent(q || ''),
      { headers: { 'x-admin-password': pw } });
    if (res.status === 401) return false;
    const data = await res.json();
    allSlots = data.slots;
    allRegs = data.registrations;
    curSearch = q || '';
    renderSummary(allSlots);
    renderView();
    return true;
  } catch (e) { return false; }
}

// 일정 선택 상태를 반영해 표를 다시 그림
function renderView() {
  const rows = slotFilter ? allRegs.filter((r) => r.slotId === slotFilter) : allRegs;
  renderTable(rows);
}

function renderSummary(slots) {
  const el = document.getElementById('summary');
  el.innerHTML = '';
  slots.forEach((s) => {
    const pct = Math.min(Math.round((s.count / s.capacity) * 100), 100);
    const stLabel = s.status === 'full' ? '마감' : s.status === 'waitlist' ? '마감 대기 중' : '신청 가능';
    const div = document.createElement('div');
    div.className = 'scell ' + s.status + (slotFilter === s.id ? ' sel' : '');
    div.title = '이 일정 신청자만 보기';
    div.innerHTML =
      '<div class="lbl">' + s.label + '</div>' +
      '<div class="cnt">' + s.count + ' <span style="font-size:13px;color:#9aa1ad;font-weight:600">/ ' + s.capacity + '</span></div>' +
      '<div class="bar"><i style="width:' + pct + '%"></i></div>' +
      '<span class="st ' + s.status + '">' + stLabel + '</span>';
    div.onclick = () => {
      slotFilter = (slotFilter === s.id) ? null : s.id; // 같은 카드 다시 누르면 전체로
      renderSummary(allSlots);
      renderView();
    };
    el.appendChild(div);
  });
}

function renderTable(rows) {
  const info = document.getElementById('countInfo');
  let base;
  if (slotFilter) {
    const s = allSlots.find((x) => x.id === slotFilter);
    base = '📅 ' + (s ? s.label : '') + (s && s.place ? ' (' + s.place + ')' : '') + ' · ' + rows.length + '건';
  } else {
    base = curSearch ? ('"' + curSearch + '" 검색 결과 ' + rows.length + '건') : ('전체 신청 ' + rows.length + '건');
  }
  info.innerHTML = esc(base) + '<span id="attendInfo"></span>'
    + (slotFilter ? ' <button class="link-clear" id="clearFilter">✕ 전체 보기</button>' : '');
  const clear = document.getElementById('clearFilter');
  if (clear) clear.onclick = () => { slotFilter = null; renderSummary(allSlots); renderView(); };
  const tb = document.getElementById('tbody');
  tb.innerHTML = '';
  if (!rows.length) {
    tb.innerHTML = '<tr><td colspan="8" class="empty">신청 내역이 없습니다.</td></tr>';
    return;
  }
  rows.forEach((r, i) => {
    const tr = document.createElement('tr');
    const dt = new Date(r.createdAt).toLocaleString('ko-KR', { dateStyle: 'short', timeStyle: 'short' });
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = !!r.attended;
    cb.style.cssText = 'width:20px; height:20px; cursor:pointer;';
    cb.onchange = () => toggleAttendance(r.id, cb);
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td class="att"></td>' +
      '<td>' + esc(r.name) + '</td>' +
      '<td>' + esc(r.email) + '</td>' +
      '<td>' + esc(r.phone) + '</td>' +
      '<td><span class="tag">' + esc(r.slotLabel) + '</span></td>' +
      '<td>' + (r.editCount >= 1 ? '수정함' : '-') + '</td>' +
      '<td>' + dt + '</td>';
    tr.querySelector('.att').appendChild(cb);
    tb.appendChild(tr);
  });
  updateAttendCount();
}

async function toggleAttendance(id, cb) {
  const prev = !cb.checked; // 이전 상태 (실패 시 복원용)
  cb.disabled = true;
  try {
    const res = await fetch('/api/admin/attendance', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-admin-password': pw },
      body: JSON.stringify({ id, attended: cb.checked }),
    });
    if (!res.ok) throw new Error('fail');
    updateAttendCount();
  } catch (e) {
    cb.checked = prev; // 저장 실패 시 원상복구
    alert('저장에 실패했습니다. 잠시 후 다시 시도해 주세요.');
  } finally {
    cb.disabled = false;
  }
}

function updateAttendCount() {
  const boxes = document.querySelectorAll('#tbody input[type=checkbox]');
  const done = document.querySelectorAll('#tbody input[type=checkbox]:checked').length;
  const span = document.getElementById('attendInfo');
  if (span) span.textContent = boxes.length ? ('  ·  참석 ' + done + ' / ' + boxes.length + '명') : '';
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function doSearch() { loadData(document.getElementById('search').value.trim()); }

function downloadCsv() {
  const q = document.getElementById('search').value.trim();
  let url = '/api/admin/csv?q=' + encodeURIComponent(q) + '&pw=' + encodeURIComponent(pw);
  if (slotFilter) url += '&slot=' + encodeURIComponent(slotFilter);
  window.location.href = url;
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('pw').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(); });
document.getElementById('searchBtn').onclick = doSearch;
document.getElementById('search').addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });
document.getElementById('csvBtn').onclick = downloadCsv;
document.getElementById('refreshBtn').onclick = () => loadData(document.getElementById('search').value.trim());
</script>
</body>
</html>
